name: validate-templates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.list.outputs.templates }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          templates=$(ls -d templates/*/ | sed 's|/$||' | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "templates=$templates" >> "$GITHUB_OUTPUT"

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -c .yamllint.yml templates/ featured-agents.json .github/

  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate featured-agents.json
        run: python scripts/validate_registry.py

  validate:
    needs: [discover, yamllint, registry]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.discover.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install stub runtime + deps
        run: |
          pip install pyyaml
          pip install ./scripts/grok_install_stub
      - name: Validate template
        run: python scripts/validate_template.py ${{ matrix.template }}
      - name: Security scan
        run: python scripts/scan_template.py ${{ matrix.template }} --fail-on warning
      - name: Mock run
        run: python scripts/mock_run_template.py ${{ matrix.template }}
